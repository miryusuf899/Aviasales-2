services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports: ["5173:5173"]
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_USE_MOCK_FALLBACK: "false"
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports: ["8000:8000"]
    environment:
      USER_SERVICE_URL: http://user-service:8001
      FLIGHT_SERVICE_URL: http://flight-service:8002
      BOOKING_SERVICE_URL: http://booking-service:8003
      PAYMENT_SERVICE_URL: http://payment-service:8004
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      - user-service
      - flight-service
      - booking-service
      - payment-service

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@user-db:5432/users_db
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
    depends_on:
      user-db:
        condition: service_healthy

  user-db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: users_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - user-db-data:/var/lib/postgresql/data

  flight-service:
    build:
      context: .
      dockerfile: services/flight-service/Dockerfile
    ports: ["8002:8002"]
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@flight-db:5432/flights_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      INTERNAL_SERVICE_TOKEN: change-me-internal
    depends_on:
      flight-db:
        condition: service_healthy
      redis:
        condition: service_started

  flight-db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: flights_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flights_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - flight-db-data:/var/lib/postgresql/data

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    ports: ["8003:8003"]
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@booking-db:5432/bookings_db
      USER_SERVICE_URL: http://user-service:8001
      FLIGHT_SERVICE_URL: http://flight-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8004
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      INTERNAL_SERVICE_TOKEN: change-me-internal
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_NOTIFICATIONS_TOPIC: notifications
      KAFKA_ENABLED: "false"
    depends_on:
      booking-db:
        condition: service_healthy
      user-service:
        condition: service_started
      flight-service:
        condition: service_started

  booking-db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: bookings_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bookings_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - booking-db-data:/var/lib/postgresql/data

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports: ["8004:8004"]
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@payment-db:5432/payments_db
      BOOKING_SERVICE_URL: http://booking-service:8003
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      INTERNAL_SERVICE_TOKEN: change-me-internal
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_NOTIFICATIONS_TOPIC: notifications
      KAFKA_ENABLED: "false"
    depends_on:
      payment-db:
        condition: service_healthy
      booking-service:
        condition: service_started

  payment-db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: payments_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payments_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports: ["8005:8005"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_NOTIFICATIONS_TOPIC: notifications
      KAFKA_ENABLED: "false"
      SMTP_HOST: sandbox.smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: your_user
      SMTP_PASSWORD: your_password
      SMTP_FROM: noreply@example.com
      TELEGRAM_BOT_TOKEN: your_bot_token
    depends_on:
      kafka:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  kafka:
    image: apache/kafka:3.8.1
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

volumes:
  user-db-data:
  flight-db-data:
  booking-db-data:
  payment-db-data:
  kafka-data:
